name: Axiom Evals (manual)

# This workflow runs the example evals against real LLM APIs.
# It's manual-only because it requires ANTHROPIC_API_KEY / OPENAI_API_KEY
# secrets that most forks won't have configured. To enable:
#   1. Add the secrets to your repo settings
#   2. Switch the trigger below to push/pull_request
on:
  workflow_dispatch:

jobs:
  eval:
    name: Run behavioral evals
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm axiom run \
            --ci \
            --json \
            --github-pr ${{ github.event.pull_request.number || '' }}
        working-directory: examples/customer-support

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: axiom-report
          path: examples/customer-support/axiom-report.json
          retention-days: 30
